<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch</title>

<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #111;
    color: white;
}

/* Center square box */
.container {
    background: #1e1e1e;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

.time {
    font-size: 40px;
    margin-bottom: 20px;
}

/* Buttons in center */
.buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

button {
    padding: 10px 15px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    border-radius: 5px;
}

.start { background: green; color: white; }
.pause { background: orange; color: white; }
.reset { background: red; color: white; }
.lap { background: blue; color: white; }

/* Lap section */
ul {
    margin-top: 20px;
    max-height: 150px;
    overflow-y: auto;
    padding: 0;
}

li {
    list-style: none;
    padding: 8px;
    margin: 5px 0;
    background: #333;
    border-radius: 5px;
}
</style>

</head>
<body>

<div class="container">
    <div class="time" id="display">00:00:00</div>

    <div class="buttons">
        <button class="start" onclick="start()">Start</button>
        <button class="pause" onclick="pause()">Pause</button>
        <button class="reset" onclick="reset()">Reset</button>
        <button class="lap" onclick="lap()">Lap</button>
    </div>

    <ul id="laps"></ul>
</div>

<script>
let seconds = 0;
let interval = null;

function updateDisplay() {
    let hrs = Math.floor(seconds / 3600);
    let mins = Math.floor((seconds % 3600) / 60);
    let secs = seconds % 60;

    document.getElementById("display").innerText =
        String(hrs).padStart(2, '0') + ":" +
        String(mins).padStart(2, '0') + ":" +
        String(secs).padStart(2, '0');
}

function start() {
    if (interval) return;
    interval = setInterval(() => {
        seconds++;
        updateDisplay();
    }, 1000);
}

function pause() {
    clearInterval(interval);
    interval = null;
}

function reset() {
    pause();
    seconds = 0;
    updateDisplay();
    document.getElementById("laps").innerHTML = "";
}

let lapCount = 0;

function lap() {
    // Allow lap anytime (even if paused)
    let lapTime = document.getElementById("display").innerText;
    let li = document.createElement("li");
    lapCount++;
    li.innerText = "Lap " + lapCount + ": " + lapTime;
    document.getElementById("laps").appendChild(li);
}
</script>

</body>
</html>
